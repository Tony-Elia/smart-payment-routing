spring:
  application:
    name: fawry-payment-routing

  datasource:
    url: jdbc:postgresql://localhost:5432/fawry
    username: fawry-user
    password: fawery-password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      indent_output: true
    deserialization:
      fail-on-unknown-properties: false
